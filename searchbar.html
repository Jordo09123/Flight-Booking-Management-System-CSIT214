<!DOCTYPE html>
<!-- Declares the document type as HTML5 -->
<html lang="en">
<!-- Sets the document language to English -->
<head>
  <!-- Defines metadata and links for the document -->
  <meta charset="UTF-8">
  <!-- Specifies the character encoding as UTF-8 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Ensures responsive design for various device widths -->
  <title>Fly Dream Air</title>
  <!-- Sets the page title displayed in the browser tab -->
  <link rel="stylesheet" href="CSS/styles.css">
  <!-- Links to an external CSS stylesheet for styling -->
  <!--booking css-->
  <link rel="stylesheet" href="CSS/managing_flight.css">
</head>
<body>
    <!-- Contains the visible content of the webpage -->
    <div class="header">
        <!-- Header section containing the logo and top navigation -->
        <div class="logo">
            <!-- Container for the website logo -->
            <a href="index.html"><img src="Images/FlyDreamAirLogo.png" alt="Fly Dream Air Logo"></a>
            <!-- Displays the Fly Dream Air logo image -->
        </div>

        <div class="top-nav">
            <!-- Top navigation bar with search and login options -->
            <div class="search-container">
                <!-- Container for the search input and icon -->
                <input type="text" placeholder="Search..." class="search-box">
                <!-- Text input for search queries -->
                <img src="Images/SearchIcon.png" alt="Search Icon" class="search-icon">
                <!-- Search icon image -->
            </div>
            <div class="login-dropdown">
                <!-- Dropdown menu for customer login options -->
                <button class="login-btn">Miss Julia</button>
                <!-- Button to trigger the customer login dropdown -->
                <div class="login-content">
                    <br>Gold Member</br>
                    <!-- Link to customer redeem points -->
                    <a href="#">Redeem Point</a>
                    <!-- Link to Log out -->
                    <a href="#">Log out</a>
                </div>
            </div>
        </div>
    </div>

    <div class="nav-tabs">
        <!-- Navigation tabs for main site sections -->
        <a href="index.html" class="active"><img src="Images/PlaneIcon.png" alt="Plane Icon" class="plane-icon">BOOK FLIGHT</a>
        <!-- Link to book flight page -->
        <a href="searchbar.html"  class="active"><img src="Images/PlaneIcon.png" alt="Plane Icon" class="plane-icon">MANAGE BOOKING</a>
        <!-- Link to manage booking page -->
        <a href="#">ONLINE CHECK-IN</a>
        <!-- Link to online check-in page -->
        <a href="#">FLIGHT STATUS</a>
        <!-- Link to flight status page -->
        <a href="#">FREQUENT FLYER</a>
        <!-- Link to frequent flyer programme page -->
        <a href="#">AIRPORT LOUNGES</a>
        <!-- Link to airport lounges page -->
    </div>

    <!-- Name Search Form -->
    <div class="search-form">
        <form action="managing_flight.html" method="GET" class="search-form">
        <input type="text" id="nameInput" name="name"  placeholder="Enter your full name" required>
        <button type="submit">Find Reservation</button>
    </form>
    </div>


    <script src="JS/manageflight_scripts.js"></script>

</body>
</html>
