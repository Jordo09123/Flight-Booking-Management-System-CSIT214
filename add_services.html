<!DOCTYPE html>
<!-- Declares the document type as HTML5 -->
<html lang="en">
<!-- Sets the document language to English -->
<head>
  <!-- Defines metadata and links for the document -->
  <meta charset="UTF-8">
  <!-- Specifies the character encoding as UTF-8 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Ensures responsive design for various device widths -->
  <title>Fly Dream Air</title>
  <!-- Sets the page title displayed in the browser tab -->
  <link rel="stylesheet" href="CSS/styles.css">
  <!-- Links to an external CSS stylesheet for styling -->
   <!--booking css-->
   <link rel="stylesheet" href="CSS/managing_flight.css">

</head>
<body>
    <!-- Contains the visible content of the webpage -->
    <div class="header">
    
    <!-- Header section containing the logo and top navigation -->
    <div class="logo">
      <!-- Container for the website logo -->
      <a href=index.html><img src="Images/FlyDreamAirLogo.png" alt="Fly Dream Air Logo"></a>
      <!-- Displays the Fly Dream Air logo image -->
    </div>
    
    <div class="top-nav">
      <!-- Top navigation bar with search and login options -->
      <div class="search-container">
        <!-- Container for the search input and icon -->
        <input type="text" placeholder="Search..." class="search-box">
        <!-- Text input for search queries -->
        <img src="Images/SearchIcon.png" alt="Search Icon" class="search-icon">
        <!-- Search icon image -->
      </div>
      <div class="login-dropdown">
        <!-- Dropdown menu for customer login options -->
        <button class="login-btn">Miss Julia</button>
        <!-- Button to trigger the customer login dropdown -->
        <div class="login-content">
          <br>Gold Member</br>
          <!-- Link to customer redeem points -->
          <a href="#">Redeem Point</a>
          <!-- Link to Log out -->
          <a href="#">Log out</a>
        </div>
      </div>
    </div>
    </div>



    <div class="container">
      <h2>Add Extra Services</h2>
      <label for="add-baggage">Extra Baggage:</label>
      <select id="add-baggage">
        <option>None</option>
        <option>1 Bag</option>
        <option>2 Bags</option>
      </select>

      <label for="meal-preference">Meal Preference:</label>
      <select id="meal-preference">
        <option>Standard</option>
        <option>Vegetarian</option>
        <option>Vegan</option>
        <option>Halal</option>
      </select>

      <label for="special-assistance">Special Assistance:</label>
      <input type="text" id="special-assistance" placeholder="e.g., wheelchair assistance" />

      <button class="primary-btn" onclick="saveExtras()">Save Services</button>
    </div>

    <script src="JS/manageflight_scripts.js"></script>

</html>
